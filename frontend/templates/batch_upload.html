{% extends "base.html" %}
{% block content %}
<h2>批量上传专利文件</h2>
<form id="batchUploadForm" enctype="multipart/form-data">
    <div class="form-group">
        <label>选择多个文件：</label>
        <input type="file" name="files" multiple accept=".doc,.docx,.pdf" required>
    </div>
    <div class="form-group">
        <label>解析方式：</label>
        <div style="display: flex; gap: 1.5rem; margin-top: 0.5rem;">
            <label><input type="radio" name="parse_mode" value="local" checked> 本地解析（Docling）</label>
            <label><input type="radio" name="parse_mode" value="online"> 在线解析（Kimi文件接口）</label>
        </div>
    </div>
    <div class="form-group">
        <label>选择模型：</label>
        <select name="model" class="form-control">
            <option value="kimi-k2-turbo-preview" selected>Kimi (k2-turbo-preview)</option>
            <option value="moonshot-v1-8k" disabled>Moonshot v1 8K (即将支持)</option>
        </select>
    </div>
    <button type="submit" class="btn btn-secondary">批量上传并质检</button>
</form>

<script>
document.getElementById('batchUploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const formData = new FormData(e.target);
    const response = await fetch('/batch_upload', { method: 'POST', body: formData });
    const result = await response.json();
    if (result.error) {
        alert('错误：' + result.error);
    } else {
        alert(`成功提交 ${result.count} 个文件`);
        window.location.href = '/results';
    }
});
</script>
{% endblock %}
